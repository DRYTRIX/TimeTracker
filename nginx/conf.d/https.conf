# Connection header for the /socket.io/ proxy.
#
# Socket.IO uses two transports. WebSocket requests arrive with `Upgrade: websocket` and
# must be proxied with `Connection: upgrade`. Long-polling requests are ordinary HTTP GETs
# with no Upgrade header; forwarding those with a hardcoded `Connection: upgrade` and an
# empty `Upgrade` is malformed, and this map — the pattern nginx documents for mixing the
# two transports — sends `close` for them instead.
#
# Note: this was investigated as the cause of `/socket.io/?EIO=4&transport=polling`
# returning HTTP 400, but an A/B test against a live instance returned 200 with *both*
# the hardcoded and the conditional header, so it is not a confirmed fix for that report.
# It is corrected here because it is wrong on its own merits. If the 400 persists, look
# at the gunicorn worker class in use and at eventlet/python-engineio compatibility.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    listen [::]:80;
    # Redirect all HTTP to HTTPS on the same host
    return 308 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    # Catch-all; optionally set a specific server_name
    server_name _;

    # Docker embedded DNS; resolve app at request time so nginx can start before app registers
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $app_upstream app:8080;

    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Allow larger file uploads (profile pictures, logos, etc.)
    client_max_body_size 10M;

    # Compress text assets. The vendored third-party libraries under /static/vendor are
    # served exactly as their packages ship them (scripts/copy-vendor.mjs deliberately
    # does not re-minify someone else's build output), so several are uncompressed on
    # disk — the Toast UI editor bundle alone is ~570 KB. gzip brings them back down to
    # roughly what the CDN used to deliver.
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/manifest+json
        image/svg+xml;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to application
    location / {
        proxy_pass http://$app_upstream;
        # Preserve original host including port (e.g., localhost:8443)
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Preserve cookies
        proxy_pass_request_headers on;
        proxy_cookie_path / /;
    }

    # Socket.IO (WebSocket) endpoint
    location /socket.io/ {
        proxy_pass http://$app_upstream/socket.io/;
        # WebSocket upgrade headers. Connection is conditional (see the map above):
        # a hardcoded "upgrade" makes Engine.IO reject every long-polling request with 400.
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # Preserve original host and client details
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts and buffering suitable for long-lived WS
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_buffering off;
    }
}


